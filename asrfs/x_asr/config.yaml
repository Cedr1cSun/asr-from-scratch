run_name: x_asr_mini100_fp32

data:
  n_train: 100
  n_eval: 20
  max_audio_seconds: 30.0 # full mode 过滤
  speed_perturb: [0.9, 1.0, 1.1]  # full 预计算三态变速增广;smoke 不读,仅保 hash 等式两文件同值

training:
  learning_rate: 0.045   # ScaledAdam base_lr(recipe 值;非 AdamW 可比)
  warmup_steps: 50       # 占位:Eden 自带 warmup(warmup_batches=500),此键 harness 可读但不驱动 Eden
  max_steps: 300
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 1
  logging_steps: 10
  eval_steps: 100
  seed: 42

smoke:
  overfit1_steps: 450  # BPE-500 重标定(vocab 501, blank 概率 1/501):460 步初跑 step_below_0.1=373
                       # → ceil(373*1.2/10)*10=450(2080Ti FP32,ScaledAdam+Eden;旧 BPE-1024 为 381→460)
  overfit1_lr: 0.045
  mini100_steps: 840   # BPE-500 重标定:840 步 mini100 通过(trend 513→11.97, non_empty 1.0,
                       # repeat 0.154, wer 0.658 recorded-only);判据阈值(0.30/0.9/0.8)未动。旧 BPE-1024
                       # probe(20 条/每 100 步)step500=0/600=14/700=20 → ceil(700*1.2/10)*10=840,沿用。
  mini100_lr: 0.045

model: {}  # 结构走 model.py SMALL_MODEL 缺省;覆写才写这里
