run_name: x_asr_full_960h

data:
  source: manifest   # 公司数据线(spec 2026-07-07):train 读 jsonl 清单;本地 e2e 用 ASRFS_DATA_SOURCE=hf 覆盖
  manifest_path: /hpc_stor03/sjtu_home/ruichen.sun/librispeech_train_960.jsonl
  n_train: 100
  n_eval: 20
  max_audio_seconds: 30.0 # full mode 过滤
  speed_perturb: [0.9, 1.0, 1.1]  # full 预计算三态变速增广;smoke 不读,仅保 hash 等式两文件同值

training:
  learning_rate: 0.04    # ScaledAdam base_lr = icefall Zipformer-S 官方值(--base-lr 0.04;
                         # 2026-07-08 调研:S 配方 3000s 音频/批,原 GA4 只有 1500s 却配 0.045,
                         # 批减半 LR 反高;#1462 有小批发散先例)
  warmup_steps: 50       # 占位:Eden 自带 warmup(warmup_batches=500),此键不驱动 Eden
  max_steps: 33000       # 30 epoch @ 有效 batch 256(≈3000s 音频/批,对齐 icefall S 配方),epoch 按原始 281241 行计
  # 集群纪律:per_device_train_batch_size 会被 harness batch_probe 值覆盖(inert),
  # 唯一可控旋钮是 gradient_accumulation_steps。gen_training_script 前必须按
  # gradient_accumulation_steps = 256 /(probe_bs × n_gpu) 改这行,否则有效 batch
  # 漂移、max_steps 全失配。
  per_device_train_batch_size: 8    # batch_probe 3090 实测 2026-07-07
  gradient_accumulation_steps: 8   # = 256/(probe_bs 8 × n_gpu 4);有效批 ≈3000s 音频 = icefall S 配方值
  dataloader_num_workers: 8      # NFS 特征随机读,workers=0 时 GPU 饥饿(2026-07-08 实测 67s/step,4×预期)
  dataloader_prefetch_factor: 4
  dataloader_persistent_workers: true
  logging_steps: 50
  eval_steps: 1000
  save_steps: 1000
  seed: 42
  lr_batches: 7500       # Eden(icefall recipe 值;Task 4 起从 cfg 读)
  lr_epochs: 3.5         # Eden(icefall recipe 值)

model: {}  # 结构走 model.py SMALL_MODEL 缺省;与 config.yaml 同源(hash 等式强制)

augment:
  spec_augment:
    time_axis: 0          # x_asr 特征 (T, 80)
    num_feature_masks: 2
    features_mask_size: 27
    num_frame_masks: 10
    frames_mask_size: 100
    max_frames_mask_fraction: 0.15
    p: 0.9
