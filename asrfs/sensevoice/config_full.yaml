run_name: sensevoice_full_960h

data:
  source: manifest   # 公司数据线(spec 2026-07-07):train 读 jsonl 清单;本地 e2e 用 ASRFS_DATA_SOURCE=hf 覆盖
  manifest_path: /hpc_stor03/sjtu_home/ruichen.sun/librispeech_train_960.jsonl
  n_train: 100
  n_eval: 20
  max_audio_seconds: 30.0 # full mode 过滤
  speed_perturb: [0.9, 1.0, 1.1]  # full 预计算三态变速增广;smoke 不读,仅保 hash 等式两文件同值

training:
  # 预防性药方(2026-07-08,parakeet blank collapse 判死后同剂量):SANM+纯 CTC
  # 从零训全网无先例(SenseVoice 本尊 300kh 工业数据超参未公开,FunASR 开源
  # recipe 全是混合 loss);按 NeMo 纯 CTC 结论取保守值,另注意官方 SANM 部署
  # 用 60ms 帧率而我们 40ms(T/N 比大 1.5×,更偏 blank),开训后逐 checkpoint 探针。
  learning_rate: 1.5e-4
  warmup_steps: 5000
  max_steps: 33000         # 30 epoch @ 有效 batch 256,epoch 按原始 281241 行计
  # 集群纪律:per_device_train_batch_size 会被 harness batch_probe 值覆盖(inert),
  # 唯一可控旋钮是 gradient_accumulation_steps。gen_training_script 前必须按
  # gradient_accumulation_steps = 256 /(probe_bs × n_gpu) 改这行,否则有效 batch
  # 漂移、max_steps 全失配。
  per_device_train_batch_size: 32   # batch_probe 3090 实测 2026-07-07
  gradient_accumulation_steps: 2   # = 256/(probe_bs 32 × n_gpu 4)
  dataloader_num_workers: 8      # NFS 特征随机读,workers=0 时 GPU 饥饿(2026-07-08 实测 67s/step,4×预期)
  dataloader_prefetch_factor: 4
  dataloader_persistent_workers: true
  logging_steps: 50
  eval_steps: 1000
  save_steps: 1000
  seed: 42

model:
  hidden_size: 384
  num_hidden_layers: 16
  num_attention_heads: 4
  intermediate_size: 1536
  fsmn_kernel_size: 11
  sanm_shift: 0
  lfr_m: 7
  lfr_n: 6
  num_mel_bins: 80
  dropout: 0.0

augment:
  spec_augment:
    time_axis: 0          # sensevoice 特征 (T, 80);LFR 在模型内,预计算特征是 10ms 帧
    num_feature_masks: 2
    features_mask_size: 27
    num_frame_masks: 10
    frames_mask_size: 100
    max_frames_mask_fraction: 0.15
    p: 0.9
