run_name: mini100_medium_fp32

model:
  size: medium
  apply_spec_augment: false
  gradient_checkpointing: true
  generation_max_length: 225

training:
  learning_rate: 1.0e-4
  warmup_steps: 50
  max_steps: 300
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  logging_steps: 10
  eval_steps: 100
  seed: 42

data:
  n_train: 100
  n_eval: 20
  max_label_len: 448      # full mode 过滤:whisper decoder max_target_positions
  max_audio_seconds: 30.0 # full mode 过滤:whisper 30s 感受野

smoke:
  overfit1_steps: 60   # 标定:Trainer 化 bs4 首次 loss<0.1 于 step 49(golden 手写循环 42,比值 1.17 在带内);ceil(49*1.2/10)*10
  overfit1_lr: 3.0e-4
  mini100_steps: 250   # 20 epoch 等效:20 * 100 / (2 * 4)
  mini100_lr: 1.0e-4
