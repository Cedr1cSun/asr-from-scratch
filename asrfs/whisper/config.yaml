model_size: medium
apply_spec_augment: false
run_name: mini100_medium_fp32

data:
  n_train: 100
  n_eval: 20

training:
  learning_rate: 1.0e-4
  warmup_steps: 50
  max_steps: 300
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  gradient_checkpointing: true
  logging_steps: 10
  eval_steps: 100
  generation_max_length: 225
