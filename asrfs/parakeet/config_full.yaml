run_name: parakeet_full_960h

data:
  source: manifest   # 公司数据线(spec 2026-07-07):train 读 jsonl 清单;本地 e2e 用 ASRFS_DATA_SOURCE=hf 覆盖
  manifest_path: /hpc_stor03/sjtu_home/ruichen.sun/librispeech_train_960.jsonl
  n_train: 100
  n_eval: 20
  max_audio_seconds: 30.0 # full mode 过滤
  speed_perturb: [0.9, 1.0, 1.1]  # full 预计算三态变速增广;smoke 不读,仅保 hash 等式两文件同值

training:
  learning_rate: 3.0e-4    # mini100 实证值(spec §4)
  warmup_steps: 2000
  max_steps: 66000         # 30 epoch @ 有效 batch 128,epoch 按原始 281241 行计;50ep→30ep(调研区间下沿,用户 2026-07-08 定 3-5 天上限)
  # 集群纪律:per_device_train_batch_size 会被 harness batch_probe 值覆盖(inert),
  # 唯一可控旋钮是 gradient_accumulation_steps。gen_training_script 前必须按
  # gradient_accumulation_steps = 128 /(probe_bs × n_gpu) 改这行,否则有效 batch
  # 漂移、max_steps(110000=50ep@128)全失配。
  per_device_train_batch_size: 32   # batch_probe 3090 实测 2026-07-07
  gradient_accumulation_steps: 1   # = 128/(probe_bs 32 × n_gpu 4),阶段二与 sensevoice 各 4 卡并行
  logging_steps: 50
  eval_steps: 1000
  save_steps: 1000
  seed: 42

model:
  hidden_size: 256
  num_hidden_layers: 16
  num_attention_heads: 4
  intermediate_size: 1024
  subsampling_factor: 8
  subsampling_conv_channels: 256
  conv_kernel_size: 9
  num_mel_bins: 80
  dropout: 0.0

augment:
  spec_augment:
    time_axis: 0          # parakeet 特征 (T, 80)
    num_feature_masks: 2
    features_mask_size: 27
    num_frame_masks: 10
    frames_mask_size: 100
    max_frames_mask_fraction: 0.15
    p: 0.9
